<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Tip Calculator</h1>
  <!-- Bill Input -->
  <div class="section">
    <label>Bill Amount (Rs)</label>
    <input type="number" id="bill" placeholder="Enter bill amount">
    <small class="error" id="billError"></small>
  </div>
  <!-- Tip Buttons -->
  <div class="section">
    <label>Select Tip %</label>
    <div class="tips">
      <button class="tip-btn">10</button>
      <button class="tip-btn">15</button>
      <button class="tip-btn">20</button>
    </div>
    <input type="number" id="customTip" placeholder="Custom Tip %">
    <small class="error" id="tipError"></small>
  </div>
  <!-- People -->
  <div class="section">
    <label>Number of People</label>
    <input type="number" id="people" placeholder="Enter people">
    <small class="error" id="peopleError"></small>
  </div>
  <!-- Results -->
  <div class="results">
    <div class="result-box">
      <span>Total Tip</span>
      <h2 id="tipAmount">Rs 0.00</h2>
    </div>
    <div class="result-box">
      <span>Grand Total</span>
      <h2 id="grandTotal">Rs 0.00</h2>
    </div>
    <div class="result-box">
      <span>Per Person</span>
      <h2 id="perPerson">Rs 0.00</h2>
    </div>
  </div>
  <button id="resetBtn">Reset</button>
</div>
<script src="script.js"></script>
</body>
</html>
